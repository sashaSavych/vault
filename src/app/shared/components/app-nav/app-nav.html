<nav class="app-nav" aria-label="App navigation">
  <div class="app-nav__pages">
    @for (page of pages; track page.path) {
      <a
        [routerLink]="page.path"
        routerLinkActive="app-nav__page--active"
        class="app-nav__page"
        [attr.aria-label]="page.label"
      >
        <i [class]="'pi ' + page.icon"></i>
        <span>{{ page.label }}</span>
      </a>
    }
  </div>
</nav>
