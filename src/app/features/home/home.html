<main class="flex min-h-screen flex-col p-4 sm:p-8">
  <header class="mx-auto flex w-full max-w-3xl items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-semibold text-primary">Vault</h1>
      @if (auth.user(); as user) {
        <p class="text-sm text-muted-color">{{ user.email }}</p>
      }
    </div>
    <p-button label="Sign out" icon="pi pi-sign-out" severity="secondary" (onClick)="auth.signOut()" />
  </header>

  <section class="mx-auto mt-8 flex w-full max-w-3xl flex-col gap-2">
    <a
      routerLink="/accounts"
      class="flex items-center gap-3 rounded-xl border border-surface-200 bg-surface-0 px-4 py-3 no-underline transition-colors hover:border-primary/30 dark:border-surface-800 dark:bg-surface-900"
    >
      <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary">
        <i class="pi pi-wallet text-base"></i>
      </div>
      <h2 class="min-w-0 flex-1 font-medium text-color">Accounts</h2>
      <i class="pi pi-chevron-right shrink-0 text-sm text-muted-color"></i>
    </a>
    <a
      routerLink="/categories"
      class="flex items-center gap-3 rounded-xl border border-surface-200 bg-surface-0 px-4 py-3 no-underline transition-colors hover:border-primary/30 dark:border-surface-800 dark:bg-surface-900"
    >
      <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary">
        <i class="pi pi-tags text-base"></i>
      </div>
      <h2 class="min-w-0 flex-1 font-medium text-color">Categories</h2>
      <i class="pi pi-chevron-right shrink-0 text-sm text-muted-color"></i>
    </a>
    <a
      routerLink="/incomes"
      class="flex items-center gap-3 rounded-xl border border-surface-200 bg-surface-0 px-4 py-3 no-underline transition-colors hover:border-primary/30 dark:border-surface-800 dark:bg-surface-900"
    >
      <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary">
        <i class="pi pi-plus-circle text-base"></i>
      </div>
      <h2 class="min-w-0 flex-1 font-medium text-color">Incomes</h2>
      <i class="pi pi-chevron-right shrink-0 text-sm text-muted-color"></i>
    </a>
    <a
      routerLink="/outcomes"
      class="flex items-center gap-3 rounded-xl border border-surface-200 bg-surface-0 px-4 py-3 no-underline transition-colors hover:border-primary/30 dark:border-surface-800 dark:bg-surface-900"
    >
      <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary">
        <i class="pi pi-minus-circle text-base"></i>
      </div>
      <h2 class="min-w-0 flex-1 font-medium text-color">Outcomes</h2>
      <i class="pi pi-chevron-right shrink-0 text-sm text-muted-color"></i>
    </a>
    <a
      routerLink="/reports"
      class="flex items-center gap-3 rounded-xl border border-surface-200 bg-surface-0 px-4 py-3 no-underline transition-colors hover:border-primary/30 dark:border-surface-800 dark:bg-surface-900"
    >
      <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary">
        <i class="pi pi-chart-bar text-base"></i>
      </div>
      <h2 class="min-w-0 flex-1 font-medium text-color">Reports</h2>
      <i class="pi pi-chevron-right shrink-0 text-sm text-muted-color"></i>
    </a>
    <a
      routerLink="/debts"
      class="flex items-center gap-3 rounded-xl border border-surface-200 bg-surface-0 px-4 py-3 no-underline transition-colors hover:border-primary/30 dark:border-surface-800 dark:bg-surface-900"
    >
      <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary">
        <i class="pi pi-book text-base"></i>
      </div>
      <h2 class="min-w-0 flex-1 font-medium text-color">Debts</h2>
      <i class="pi pi-chevron-right shrink-0 text-sm text-muted-color"></i>
    </a>
    <a
      routerLink="/transfers"
      class="flex items-center gap-3 rounded-xl border border-surface-200 bg-surface-0 px-4 py-3 no-underline transition-colors hover:border-primary/30 dark:border-surface-800 dark:bg-surface-900"
    >
      <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary">
        <i class="pi pi-arrow-right-arrow-left text-base"></i>
      </div>
      <h2 class="min-w-0 flex-1 font-medium text-color">Transfers</h2>
      <i class="pi pi-chevron-right shrink-0 text-sm text-muted-color"></i>
    </a>
  </section>
</main>
