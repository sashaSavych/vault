<main class="flex min-h-screen flex-col p-4 sm:p-8">
  <header class="mx-auto flex w-full max-w-3xl items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-semibold text-primary">Vault</h1>
      @if (auth.user(); as user) {
        <p class="text-sm text-muted-color">{{ user.email }}</p>
      }
    </div>
    <p-button label="Sign out" icon="pi pi-sign-out" severity="secondary" (onClick)="auth.signOut()" />
  </header>

  <section class="mx-auto mt-12 flex w-full max-w-3xl flex-col gap-3">
    <a
      routerLink="/accounts"
      class="flex items-center gap-4 rounded-2xl border border-surface-200 bg-surface-0 p-6 no-underline transition-colors hover:border-primary/30 dark:border-surface-800 dark:bg-surface-900"
    >
      <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-primary/10 text-primary">
        <i class="pi pi-wallet text-xl"></i>
      </div>
      <div class="flex-1">
        <h2 class="font-medium text-color">Accounts</h2>
        <p class="text-sm text-muted-color">Add, edit, and remove your wallets</p>
      </div>
      <i class="pi pi-chevron-right text-muted-color"></i>
    </a>
    <a
      routerLink="/categories"
      class="flex items-center gap-4 rounded-2xl border border-surface-200 bg-surface-0 p-6 no-underline transition-colors hover:border-primary/30 dark:border-surface-800 dark:bg-surface-900"
    >
      <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-primary/10 text-primary">
        <i class="pi pi-tags text-xl"></i>
      </div>
      <div class="flex-1">
        <h2 class="font-medium text-color">Categories</h2>
        <p class="text-sm text-muted-color">Income and outcome labels</p>
      </div>
      <i class="pi pi-chevron-right text-muted-color"></i>
    </a>
    <a
      routerLink="/incomes"
      class="flex items-center gap-4 rounded-2xl border border-surface-200 bg-surface-0 p-6 no-underline transition-colors hover:border-primary/30 dark:border-surface-800 dark:bg-surface-900"
    >
      <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-primary/10 text-primary">
        <i class="pi pi-plus-circle text-xl"></i>
      </div>
      <div class="flex-1">
        <h2 class="font-medium text-color">Incomes</h2>
        <p class="text-sm text-muted-color">Record income to accounts</p>
      </div>
      <i class="pi pi-chevron-right text-muted-color"></i>
    </a>
    <a
      routerLink="/outcomes"
      class="flex items-center gap-4 rounded-2xl border border-surface-200 bg-surface-0 p-6 no-underline transition-colors hover:border-primary/30 dark:border-surface-800 dark:bg-surface-900"
    >
      <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-primary/10 text-primary">
        <i class="pi pi-minus-circle text-xl"></i>
      </div>
      <div class="flex-1">
        <h2 class="font-medium text-color">Outcomes</h2>
        <p class="text-sm text-muted-color">Record expenses from accounts</p>
      </div>
      <i class="pi pi-chevron-right text-muted-color"></i>
    </a>
    <a
      routerLink="/transfers"
      class="flex items-center gap-4 rounded-2xl border border-surface-200 bg-surface-0 p-6 no-underline transition-colors hover:border-primary/30 dark:border-surface-800 dark:bg-surface-900"
    >
      <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-primary/10 text-primary">
        <i class="pi pi-arrow-right-arrow-left text-xl"></i>
      </div>
      <div class="flex-1">
        <h2 class="font-medium text-color">Transfers</h2>
        <p class="text-sm text-muted-color">Move money between accounts</p>
      </div>
      <i class="pi pi-chevron-right text-muted-color"></i>
    </a>
  </section>
</main>
