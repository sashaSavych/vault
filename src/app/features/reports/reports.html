<main class="flex min-h-screen flex-col p-4 sm:p-8">
  <header class="mx-auto flex w-full max-w-3xl flex-wrap items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-semibold text-primary">Reports</h1>
      <p class="text-sm text-muted-color">Summaries and breakdowns</p>
    </div>
  </header>

  <section id="reports-list" class="mx-auto mt-8 w-full max-w-3xl">
    <ul class="flex flex-col gap-3">
      @for (report of reports; track report.id) {
        <li>
          <a
            [routerLink]="report.route"
            class="flex items-center gap-4 rounded-2xl border border-surface-200 bg-surface-0 p-5 no-underline transition-colors hover:border-primary/30 dark:border-surface-800 dark:bg-surface-900"
          >
            <div
              class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-primary/10 text-primary"
            >
              <i [class]="'pi ' + report.icon + ' text-xl'"></i>
            </div>
            <div class="min-w-0 flex-1">
              <h2 class="font-medium text-color">{{ report.title }}</h2>
              <p class="mt-1 text-sm text-muted-color">{{ report.description }}</p>
            </div>
            <i class="pi pi-chevron-right shrink-0 text-muted-color"></i>
          </a>
        </li>
      }
    </ul>
  </section>
</main>
