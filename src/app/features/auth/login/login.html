<app-auth-layout>
  <h1 class="mb-1 text-xl font-semibold">Sign in</h1>
  <p class="mb-6 text-sm text-muted-color">Welcome back. Enter your credentials.</p>

  @if (errorMessage(); as message) {
    <p-message severity="error" [text]="message" styleClass="mb-4 w-full" />
  }

  <form class="flex flex-col gap-4" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="flex flex-col gap-1">
      <label for="email" class="text-sm font-medium">Email</label>
      <input
        pInputText
        id="email"
        type="email"
        autocomplete="email"
        formControlName="email"
        class="w-full"
        [invalid]="showError('email')"
      />
      @if (showError('email')) {
        <small class="text-red-500">Enter a valid email.</small>
      }
    </div>

    <div class="flex flex-col gap-1">
      <label for="password" class="text-sm font-medium">Password</label>
      <p-password
        inputId="password"
        formControlName="password"
        [feedback]="false"
        toggleMask
        autocomplete="current-password"
        styleClass="w-full"
        inputStyleClass="w-full"
        [invalid]="showError('password')"
      />
      @if (showError('password')) {
        <small class="text-red-500">Password must be at least 6 characters.</small>
      }
    </div>

    <p-button
      type="submit"
      label="Sign in"
      styleClass="w-full"
      [loading]="loading()"
      [disabled]="loading()"
    />

    <p class="text-center text-sm text-muted-color">
      No account?
      <a routerLink="/signup" class="font-medium text-primary no-underline hover:underline">Sign up</a>
    </p>
  </form>
</app-auth-layout>
