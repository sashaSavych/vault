<main class="flex min-h-screen flex-col p-4 sm:p-8">
  <header class="mx-auto flex w-full max-w-3xl flex-wrap items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-semibold text-primary">More</h1>
      <p class="text-sm text-muted-color">Additional management options</p>
    </div>
    <div class="flex gap-2">
      <p-button
        [label]="auth.userDisplayName()"
        icon="pi pi-sign-out"
        severity="secondary"
        (onClick)="auth.signOut()"
      />
    </div>
  </header>

  <section class="mx-auto mt-8 w-full max-w-3xl">
    <ul class="grid gap-4 sm:grid-cols-2">
      @for (page of pages; track page.path) {
        <li>
          <a [routerLink]="page.path" class="no-underline">
            <div
              class="flex items-center gap-4 rounded-2xl border border-surface-200 bg-surface-0 p-6 transition-colors hover:bg-surface-50 dark:border-surface-800 dark:bg-surface-900 dark:hover:bg-surface-800"
            >
              <div class="rounded-xl bg-primary/10 p-3 text-primary">
                <i [class]="'pi ' + page.icon + ' text-2xl'"></i>
              </div>
              <div class="flex-1">
                <h2 class="font-semibold">{{ page.label }}</h2>
                <p class="text-sm text-muted-color">Manage {{ page.label | lowercase }}</p>
              </div>
              <i class="pi pi-chevron-right shrink-0 text-muted-color"></i>
            </div>
          </a>
        </li>
      }
    </ul>
  </section>
</main>
